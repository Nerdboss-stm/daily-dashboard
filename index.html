<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>Saran — Daily Command</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0efe8;
  --muted: rgba(240,239,232,0.45);
  --dim: rgba(240,239,232,0.2);

  --maang: #7f77dd;
  --maang-bg: rgba(127,119,221,0.12);
  --maang-border: rgba(127,119,221,0.3);

  --ghost: #d85a30;
  --ghost-bg: rgba(216,90,48,0.12);
  --ghost-border: rgba(216,90,48,0.3);

  --visa: #ba7517;
  --visa-bg: rgba(186,117,23,0.12);
  --visa-border: rgba(186,117,23,0.3);

  --pulse: #378add;
  --pulse-bg: rgba(55,138,221,0.12);
  --pulse-border: rgba(55,138,221,0.3);

  --linkedin: #639922;
  --linkedin-bg: rgba(99,153,34,0.12);
  --linkedin-border: rgba(99,153,34,0.3);

  --physical: #1d9e75;
  --physical-bg: rgba(29,158,117,0.12);
  --physical-border: rgba(29,158,117,0.3);

  --admin: #888780;
  --admin-bg: rgba(136,135,128,0.1);
  --admin-border: rgba(136,135,128,0.25);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.brand { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.date-pill {
  font-family: 'DM Mono', monospace; font-size: 11px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 4px 10px; color: var(--muted);
}
.notify-btn {
  font-size: 11px; font-family: 'DM Mono', monospace;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 4px 10px; color: var(--muted);
  cursor: pointer; transition: all 0.2s;
}
.notify-btn.on { color: var(--physical); border-color: var(--physical-border); background: var(--physical-bg); }

/* ── DAY TABS ── */
.day-tabs {
  display: flex; gap: 4px; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 6px 12px; border-radius: 8px; font-size: 12px;
  font-weight: 500; border: 1px solid transparent; cursor: pointer;
  color: var(--muted); background: transparent; transition: all 0.18s;
  font-family: 'DM Sans', sans-serif;
}
.day-tab:hover { background: var(--surface2); color: var(--text); }
.day-tab.active {
  background: var(--surface2); color: var(--text);
  border-color: var(--border2);
}
.day-tab.today { position: relative; }
.day-tab.today::after {
  content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--physical);
}

/* ── PROGRESS BAR ── */
.progress-wrap { padding: 12px 16px 0; }
.progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.progress-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.progress-count { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text); }
.progress-track { height: 3px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: var(--physical); transition: width 0.4s cubic-bezier(.4,0,.2,1); }

/* ── STATS ROW ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 12px 16px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.stat-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 600; font-family: 'Syne', sans-serif; }

/* ── BLOCKS ── */
.blocks { padding: 0 16px 100px; display: flex; flex-direction: column; gap: 6px; }

.section-label {
  font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500;
  color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase;
  padding: 12px 0 4px;
}

.block {
  border-radius: 12px; padding: 12px 14px;
  border: 1px solid transparent;
  display: flex; align-items: flex-start; gap: 11px;
  cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.block:active { transform: scale(0.985); }
.block.done { opacity: 0.35; }
.block.done .block-title { text-decoration: line-through; }

.block-check {
  width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
  border: 1.5px solid; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.block.done .block-check { background: currentColor; }
.checkmark { width: 10px; height: 10px; opacity: 0; transition: opacity 0.15s; }
.block.done .checkmark { opacity: 1; }

.block-body { flex: 1; min-width: 0; }
.block-title { font-size: 14px; font-weight: 500; line-height: 1.35; margin-bottom: 2px; }
.block-time { font-size: 11px; font-family: 'DM Mono', monospace; opacity: 0.6; margin-bottom: 4px; }
.block-note { font-size: 12px; opacity: 0.65; line-height: 1.45; }

.block-dur {
  font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500;
  padding: 3px 8px; border-radius: 20px; flex-shrink: 0; align-self: flex-start;
  opacity: 0.8;
}

/* ── WALL BLOCK ── */
.wall-block {
  background: var(--physical-bg); border: 1px solid var(--physical-border);
  border-radius: 12px; padding: 14px 16px; margin: 4px 0;
  display: flex; align-items: center; gap: 10px;
}
.wall-icon { font-size: 18px; }
.wall-text { flex: 1; }
.wall-title { font-size: 13px; font-weight: 500; color: var(--physical); font-family: 'Syne', sans-serif; }
.wall-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

/* ── NEXT UP TOAST ── */
.next-up {
  position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 100;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 14px; padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
}
.next-up.hidden { transform: translateY(80px); opacity: 0; pointer-events: none; }
.next-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--physical); flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.next-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.next-title { font-size: 13px; font-weight: 500; }
.next-time { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-left: auto; flex-shrink: 0; }

/* ── CAT COLORS ── */
.cat-maang     { --c: var(--maang);    --cbg: var(--maang-bg);    --cbr: var(--maang-border); }
.cat-ghost     { --c: var(--ghost);    --cbg: var(--ghost-bg);    --cbr: var(--ghost-border); }
.cat-visa      { --c: var(--visa);     --cbg: var(--visa-bg);     --cbr: var(--visa-border); }
.cat-pulse     { --c: var(--pulse);    --cbg: var(--pulse-bg);    --cbr: var(--pulse-border); }
.cat-linkedin  { --c: var(--linkedin); --cbg: var(--linkedin-bg); --cbr: var(--linkedin-border); }
.cat-physical  { --c: var(--physical); --cbg: var(--physical-bg); --cbr: var(--physical-border); }
.cat-admin     { --c: var(--admin);    --cbg: var(--admin-bg);    --cbr: var(--admin-border); }

.block { background: var(--cbg); border-color: var(--cbr); color: var(--c); }
.block-check { border-color: var(--c); color: var(--bg); }
.block-title, .block-note { color: var(--text); }
.block-time { color: var(--c); }
.block-dur { background: rgba(255,255,255,0.07); color: var(--c); }
</style>
</head>

  ],
  Sun: [
    {section:'Morning'},
    {time:'8:00', dur:60, label:'Slow morning — screens off 30 min', cat:'admin', icon:'☕', note:'Eat. Think. Plan the week mentally before opening any app.'},
    {time:'9:00', dur:90, label:'MAANG — behavioral deep dive', cat:'maang', icon:'🧠', note:'Your weakest area. Record yourself doing 3 full STAR stories. Watch playback. Fix gaps.'},
    {time:'10:30',dur:30, label:'LinkedIn post + engagement', cat:'linkedin', icon:'✍️', note:'Post + reply to all comments from the week. Engage 10 posts in feed.'},
    {time:'11:00',dur:90, label:'VisaBridge or PulseTrack — whichever is behind', cat:'visa', icon:'⚡', note:'Check Friday\'s retro. Pick the one that missed its weekly target.'},
    {section:'Afternoon'},
    {time:'12:30',dur:45, label:'Lunch + full break', cat:'admin', icon:'🍱', note:'Walk outside. No code. No phone.'},
    {time:'1:15', dur:60, label:'Ghost Apply — week config & targeting', cat:'ghost', icon:'🔧', note:'Update Groq prompts, Apollo filters, target list for Mon–Fri. Set weekly app target.'},
    {time:'2:15', dur:45, label:'LinkedIn — connections + DMs', cat:'linkedin', icon:'🔗', note:'Send 15 tiered connection requests. Reply DMs. Accept relevant requests.'},
    {time:'3:00', dur:90, label:'Week plan — set Monday targets', cat:'admin', icon:'📋', note:'Set concrete targets: 50 apps, 10 MAANG problems, 7 posts, 3 commits, 1 screen shipped.'},
    {time:'4:30', dur:60, label:'Buffer / overflow / genuine rest', cat:'admin', icon:'🔧', note:'Catch anything that slipped. Or full stop — protect Sunday energy for the week.'},
    {wall:true},
  ],
};

// ── STATE ──
const todayIdx = new Date().getDay(); // 0=Sun
const dayKeys = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
let currentDay = dayKeys[todayIdx];
let notificationsOn = false;
let notifTimer = null;

function storageKey(day) { return 'saran_done_' + day + '_' + new Date().toDateString(); }

function loadDone(day) {
  try { return JSON.parse(localStorage.getItem(storageKey(day)) || '{}'); } catch { return {}; }
}
function saveDone(day, done) {
  try { localStorage.setItem(storageKey(day), JSON.stringify(done)); } catch {}
}

let doneMap = loadDone(currentDay);

// ── RENDER ──
function render() {
  renderTabs();
  renderBlocks();
  renderStats();
  updateNextUp();
}

function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = dayKeys.map((d,i) => {
    const isToday = i === todayIdx;
    const isActive = d === currentDay;
    return `<button class="day-tab${isActive?' active':''}${isToday?' today':''}" onclick="switchDay('${d}')">${d}</button>`;
  }).join('');

  const now = new Date();
  document.getElementById('datePill').textContent = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function getBlocks(day) {
  return SCHEDULE[day].filter(b => b.time);
}

function renderBlocks() {
  const sched = SCHEDULE[currentDay];
  let blockIdx = 0;
  document.getElementById('blocks').innerHTML = sched.map(b => {
    if (b.wall) return `<div class="wall-block"><div class="wall-icon">🏸</div><div class="wall-text"><div class="wall-title">5:30 PM — Physical block. Locked.</div><div class="wall-sub">Jog + badminton + dinner + wind-down until 12 AM. No work.</div></div></div>`;
    if (b.section) return `<div class="section-label">${b.section}</div>`;
    const i = blockIdx++;
    const isDone = !!doneMap[i];
    return `<div class="block cat-${b.cat}${isDone?' done':''}" onclick="toggleBlock(${i})">
      <div class="block-check">
        <svg class="checkmark" viewBox="0 0 10 10" fill="none">
          <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="block-body">
        <div class="block-title">${b.label}</div>
        <div class="block-time">${b.time} · ${mL(b.dur)}</div>
        ${b.note ? `<div class="block-note">${b.note}</div>` : ''}
      </div>
      <div class="block-dur">${mL(b.dur)}</div>
    </div>`;
  }).join('');
}

function renderStats() {
  const blocks = getBlocks(currentDay);
  const total = blocks.length;
  const done = Object.values(doneMap).filter(Boolean).length;
  const pct = total ? Math.round((done/total)*100) : 0;

  document.getElementById('progressCount').textContent = done + ' / ' + total;
  document.getElementById('progressFill').style.width = pct + '%';

  let focusMins = 0;
  blocks.forEach(b => {
    if (['maang','visa','pulse'].includes(b.cat)) focusMins += b.dur;
  });

  const ghostMins = blocks.filter(b=>b.cat==='ghost').reduce((s,b)=>s+b.dur,0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-label">focus hrs</div><div class="stat-val" style="color:var(--maang)">${(focusMins/60).toFixed(1)}h</div></div>
    <div class="stat"><div class="stat-label">ghost time</div><div class="stat-val" style="color:var(--ghost)">${mL(ghostMins)}</div></div>
    <div class="stat"><div class="stat-label">done</div><div class="stat-val" style="color:var(--physical)">${pct}%</div></div>
  `;
}

function updateNextUp() {
  if (currentDay !== dayKeys[todayIdx]) {
    document.getElementById('nextUp').classList.add('hidden');
    return;
  }
  const now = new Date();
  const nowMins = now.getHours()*60 + now.getMinutes();
  const blocks = getBlocks(currentDay);

  const next = blocks.find(b => {
    const [h,m] = b.time.split(':').map(Number);
    return (h*60+m) > nowMins;
  });

  const nextUp = document.getElementById('nextUp');
  if (next) {
    document.getElementById('nextTitle').textContent = next.label;
    document.getElementById('nextTime').textContent = next.time;
    nextUp.classList.remove('hidden');
  } else {
    nextUp.classList.add('hidden');
  }
}

// ── INTERACTIONS ──
function switchDay(d) {
  currentDay = d;
  doneMap = loadDone(d);
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleBlock(i) {
  doneMap[i] = !doneMap[i];
  saveDone(currentDay, doneMap);
  renderBlocks();
  renderStats();
}

// ── NOTIFICATIONS ──
async function toggleNotifications() {
  if (notificationsOn) {
    notificationsOn = false;
    clearTimeout(notifTimer);
    document.getElementById('notifyBtn').className = 'notify-btn';
    document.getElementById('notifyBtn').textContent = '🔔 reminders';
    return;
  }
  if (!('Notification' in window)) { alert('Notifications not supported in this browser.'); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('Please allow notifications to enable reminders.'); return; }
  notificationsOn = true;
  document.getElementById('notifyBtn').className = 'notify-btn on';
  document.getElementById('notifyBtn').textContent = '🔔 on';
  scheduleNextNotification();
}

function scheduleNextNotification() {
  if (!notificationsOn) return;
  const day = dayKeys[new Date().getDay()];
  const now = new Date();
  const nowMins = now.getHours()*60 + now.getMinutes();
  const blocks = getBlocks(day);

  const next = blocks.find(b => {
    const [h,m] = b.time.split(':').map(Number);
    return (h*60+m) > nowMins;
  });

  if (!next) return;
  const [h,m] = next.time.split(':').map(Number);
  const targetMs = new Date();
  targetMs.setHours(h, m, 0, 0);
  const msUntil = targetMs - now;
  if (msUntil <= 0) return;

  notifTimer = setTimeout(() => {
    new Notification('⏰ ' + next.label, {
      body: next.time + ' · ' + mL(next.dur) + (next.note ? '\n' + next.note : ''),
      icon: 'https://emojicdn.elk.sh/⏰',
      badge: 'https://emojicdn.elk.sh/📋',
    });
    setTimeout(scheduleNextNotification, 60000);
  }, msUntil);
}

// ── INIT ──
render();
setInterval(updateNextUp, 60000);
</script>
</body>
</html>
